name: CI — Build & Trivy Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

env:
  REGISTRY: ghcr.io

jobs:
  # ── 1. Détection des services modifiés ──────────────────────
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      auth-service:         ${{ steps.f.outputs.auth-service }}
      user-service:         ${{ steps.f.outputs.user-service }}
      course-service:       ${{ steps.f.outputs.course-service }}
      content-service:      ${{ steps.f.outputs.content-service }}
      quiz-service:         ${{ steps.f.outputs.quiz-service }}
      forum-service:        ${{ steps.f.outputs.forum-service }}
      messaging-service:    ${{ steps.f.outputs.messaging-service }}
      notification-service: ${{ steps.f.outputs.notification-service }}
      chatbot-service:      ${{ steps.f.outputs.chatbot-service }}
      executor-service:     ${{ steps.f.outputs.executor-service }}
      frontend:             ${{ steps.f.outputs.frontend }}
      payment-service:      ${{ steps.f.outputs.payment-service }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: f
        with:
          filters: |
            auth-service:
              - 'backend/auth-service/**'
            user-service:
              - 'backend/user-service/**'
            course-service:
              - 'backend/course-service/**'
            content-service:
              - 'backend/content-service/**'
            quiz-service:
              - 'backend/quiz-service/**'
            forum-service:
              - 'backend/forum-service/**'
            messaging-service:
              - 'backend/messaging-service/**'
            notification-service:
              - 'backend/notification-service/**'
            chatbot-service:
              - 'backend/chatbot-service/**'
            executor-service:
              - 'backend/executor-service/**'
            frontend:
              - 'frontend/**'
            payment-service:
              - 'backend/payment-service/**'

  # ── 2. Build + Trivy par service (matrix) ───────────────────
  build-and-scan:
    name: Build + Trivy [${{ matrix.service }}]
    needs: detect-changes
    runs-on: ubuntu-latest
    if: always()
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: auth-service
            context: backend/auth-service
          - service: user-service
            context: backend/user-service
          - service: course-service
            context: backend/course-service
          - service: content-service
            context: backend/content-service
          - service: quiz-service
            context: backend/quiz-service
          - service: forum-service
            context: backend/forum-service
          - service: messaging-service
            context: backend/messaging-service
          - service: notification-service
            context: backend/notification-service
          - service: chatbot-service
            context: backend/chatbot-service
          - service: executor-service
            context: backend/executor-service
          - service: frontend
            context: frontend/angular-app
          - service: payment-service
            context: backend/payment-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
          load: true
          tags: elearning-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy FS Scan (table)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.context }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          output: trivy-fs-${{ matrix.service }}.txt
        continue-on-error: true

      - name: Trivy Image Scan (JSON)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: elearning-${{ matrix.service }}:${{ github.sha }}
          format: json
          output: trivy-${{ matrix.service }}.json
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        continue-on-error: true

      - name: Trivy Image Scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: elearning-${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          exit-code: 0
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles(format('trivy-{0}.sarif', matrix.service)) != ''
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
        continue-on-error: true

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-${{ matrix.service }}
          path: |
            trivy-${{ matrix.service }}.json
            trivy-fs-${{ matrix.service }}.txt
          if-no-files-found: warn
          retention-days: 30

  # ── 3. Security Dashboard ────────────────────────────────────
  security-dashboard:
    name: Security Dashboard
    needs: build-and-scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Trivy reports
        uses: actions/download-artifact@v4
        with:
          path: trivy-reports/
          pattern: trivy-*
          merge-multiple: true
        continue-on-error: true

      - name: Generate HTML Dashboard
        run: |
          if [ -f scripts/generate-security-dashboard.py ]; then
            python3 scripts/generate-security-dashboard.py \
              --input-dir trivy-reports/ \
              --output security-dashboard.html || \
            echo "<h1>Aucun rapport Trivy disponible</h1>" > security-dashboard.html
          else
            echo "<h1>Script dashboard manquant</h1>" > security-dashboard.html
          fi

      - name: Upload Dashboard
        uses: actions/upload-artifact@v4
        with:
          name: security-dashboard
          path: security-dashboard.html
          retention-days: 30

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let critical = 0, high = 0, medium = 0;
            try {
              const files = fs.readdirSync('trivy-reports/').filter(f => f.endsWith('.json'));
              for (const f of files) {
                const data = JSON.parse(fs.readFileSync(`trivy-reports/${f}`, 'utf8'));
                for (const result of (data.Results || [])) {
                  for (const vuln of (result.Vulnerabilities || [])) {
                    if (vuln.Severity === 'CRITICAL') critical++;
                    else if (vuln.Severity === 'HIGH') high++;
                    else if (vuln.Severity === 'MEDIUM') medium++;
                  }
                }
              }
            } catch(e) { console.log('Pas de rapports JSON:', e.message); }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🛡️ Trivy Security Scan\n\n| 🔴 Critical | 🟠 High | 🟡 Medium |\n|------------|---------|----------|\n| ${critical} | ${high} | ${medium} |\n\n> Dashboard complet dans les artifacts.`
            });

  # ── 4. CI Gate (résumé final) ────────────────────────────────
  ci-success:
    name: CI Gate
    needs: [build-and-scan, security-dashboard]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Result
        run: |
          echo "Build: ${{ needs.build-and-scan.result }}"
          echo "Dashboard: ${{ needs.security-dashboard.result }}"
          if [[ "${{ needs.build-and-scan.result }}" == "failure" ]]; then
            echo "❌ CI échoué"; exit 1
          fi
          echo "✅ CI réussi — Dashboard disponible dans les artifacts"
