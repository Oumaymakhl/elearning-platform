apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  namespace: elearning
  labels:
    app: content-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: content-service
          image: ACCOUNT_ID.dkr.ecr.eu-west-1.amazonaws.com/elearning-content-service:latest
          ports:
            - containerPort: 9000
          envFrom:
            - configMapRef:
                name: content-service-config
            - secretRef:
                name: content-service-secrets
          resources:
            requests: { memory: "256Mi", cpu: "100m" }
            limits:   { memory: "512Mi", cpu: "500m" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: tmp-vol
              mountPath: /tmp
            - name: storage-vol
              mountPath: /var/www/html/storage
      volumes:
        - name: tmp-vol
          emptyDir: {}
        - name: storage-vol
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: content-service
  namespace: elearning
spec:
  selector:
    app: content-service
  ports:
    - port: 80
      targetPort: 9000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: content-service-hpa
  namespace: elearning
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: content-service
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
