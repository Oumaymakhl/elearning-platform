<div class="layout">
  <app-sidebar></app-sidebar>
  <main class="main">
    <div class="loading" *ngIf="loading">Chargement...</div>
    <div *ngIf="!loading && course">
      <div class="header">
        <div>
          <a [routerLink]="['/courses', course.id]" class="back">← Retour au cours</a>
          <div class="course-manage-header">
            <h1>📖 Gestion : {{ course.title }}</h1>
            <button class="btn-edit-course" (click)="showCourseEdit = !showCourseEdit">✏️ Modifier le cours</button>
          </div>
          <div class="course-edit-form" *ngIf="showCourseEdit" [formGroup]="courseForm">
            <div class="form-row">
              <label>Titre</label>
              <input type="text" formControlName="title" placeholder="Titre du cours">
            </div>
            <div class="form-row">
              <label>Description</label>
              <textarea formControlName="description" placeholder="Description du cours" rows="3"></textarea>
            </div>
            <div class="form-row">
              <label>Niveau</label>
              <select formControlName="level">
                <option value="debutant">🟢 Debutant</option>
                <option value="intermediaire">🟡 Intermediaire</option>
                <option value="avance">🔴 Avance</option>
              </select>
            </div>
            <div class="form-actions">
              <button class="btn-save" (click)="saveCourse()" [disabled]="savingCourse">
                {{ savingCourse ? "Sauvegarde..." : "💾 Sauvegarder" }}
              </button>
              <button class="btn-cancel" (click)="showCourseEdit = false">Annuler</button>
            </div>
          </div>
        </div>
        <button class="btn-primary" (click)="showChapterForm = !showChapterForm">
          {{ showChapterForm ? 'Annuler' : '+ Ajouter un chapitre' }}
        </button>
      </div>

      <div class="form-card" *ngIf="showChapterForm">
        <h3>Nouveau chapitre</h3>
        <form [formGroup]="chapterForm" (ngSubmit)="addChapter()">
          <div class="field">
            <label>Titre *</label>
            <input type="text" formControlName="title" placeholder="Ex: Introduction">
          </div>
          <div class="field">
            <label>Objectif</label>
            <input type="text" formControlName="objective" placeholder="Objectif du chapitre">
          </div>
          <button type="submit" [disabled]="chapterForm.invalid || saving">
            {{ saving ? 'Ajout...' : 'Ajouter le chapitre' }}
          </button>
        </form>
      </div>

      <div class="empty" *ngIf="chapters.length === 0">Aucun chapitre. Ajoutez-en un !</div>

      <div class="chapter-card" *ngFor="let chapter of chapters">
        <div class="chapter-header">
          <div>
            <span class="chapter-title">📖 {{ chapter.title }}</span>
            <span class="chapter-obj" *ngIf="chapter.objective">— {{ chapter.objective }}</span>
          </div>
          <div class="chapter-actions">
            <button class="btn-add-sub" (click)="showSubForm[chapter.id] = !showSubForm[chapter.id]">
              {{ showSubForm[chapter.id] ? 'Annuler' : '+ Sous-chapitre' }}
            </button>
            <a [routerLink]="['/quiz-manage', course.id, chapter.id]" class="btn-quiz">🧠 Quiz</a>
            <button class="btn-del" (click)="deleteChapter(chapter.id)">🗑️</button>
          </div>
        </div>

        <div class="sub-form" *ngIf="showSubForm[chapter.id]">
          <form [formGroup]="subForms[chapter.id]" (ngSubmit)="addSubChapter(chapter.id)">
            <div class="sub-fields">
              <div class="field">
                <label>Titre *</label>
                <input type="text" formControlName="title" placeholder="Titre du sous-chapitre">
              </div>
              <div class="field">
                <label>Contenu</label>
                <app-rich-editor formControlName="content"></app-rich-editor>
              </div>
              <div class="field-check">
                <input type="checkbox" formControlName="is_lab" id="lab-{{chapter.id}}">
                <label for="lab-{{chapter.id}}">🔬 C'est un TD/Lab</label>
              </div>
                <div class="field">
                  <label>Score minimum pour debloquer le suivant (%)</label>
                  <input type="number" formControlName="passing_score" placeholder="70">
                </div>
              <button type="submit" [disabled]="subForms[chapter.id].invalid || saving">
                {{ saving ? 'Ajout...' : 'Ajouter' }}
              </button>
            </div>
          </form>
        </div>

        <div class="subchapters">
          <div class="subchapter" *ngFor="let sub of chapter.sub_chapters || chapter.subChapters || []">
            <span>{{ sub.is_lab ? '🔬' : '📄' }} {{ sub.title }}</span>
              <a *ngIf="sub.is_lab" [routerLink]="['/courses', course.id, 'td', sub.id]" class="btn-td">⚙️ TD</a>
            <button class="btn-del-sm" (click)="deleteSubChapter(chapter.id, sub.id)">🗑️</button>
          </div>
          <div class="no-sub" *ngIf="!(chapter.subChapters?.length || chapter.sub_chapters?.length)">
            Aucun sous-chapitre
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
